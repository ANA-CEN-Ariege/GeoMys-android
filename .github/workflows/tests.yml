# Filet de sécurité : la suite de tests unitaires (JVM/Robolectric, ~320 tests) tourne à
# chaque push et PR sur les deux branches. `main` doit rester releasable en permanence ;
# `develop` porte le travail courant (cf. workflow de branches du projet).
name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Cache Gradle + wrapper gérés par l'action officielle.
      - name: Gradle
        uses: gradle/actions/setup-gradle@v4

      # Depuis l'introduction des flavors (github/play), `testDebugUnitTest` n'existe plus :
      # on cible le flavor github (canal principal). Les tests vivent dans le source set
      # partagé `src/test`, donc identiques aux deux flavors — un seul suffit comme filet.
      - name: Tests unitaires
        run: ./gradlew testGithubDebugUnitTest

      # Android Lint : les tests unitaires ne voient ni les ressources, ni le manifest, ni
      # les erreurs d'API-level — lint si. Un seul variant suffit (les sources sont
      # quasi intégralement partagées) ; lintGithubDebug échoue le build sur toute ERREUR lint.
      - name: Lint
        run: ./gradlew lintGithubDebug

      # Builds RELEASE des deux canaux (non signés : pas de keystore en CI, le build.gradle
      # dégrade proprement). Sans ces tâches, une erreur de ressource/manifest propre au
      # flavor play — jamais compilé par les tests — n'était détectée qu'au moment de publier.
      - name: Assemble release (github + play)
        run: ./gradlew assembleGithubRelease bundlePlayRelease

      # Rapport JUnit publié en artefact quand ça casse (diagnostic sans re-run local).
      - name: Rapport de tests (en échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-tests
          path: app/build/reports/tests/testGithubDebugUnitTest/

      # Rapport lint publié en artefact quand ça casse.
      - name: Rapport lint (en échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-lint
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore