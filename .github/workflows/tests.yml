# Filet de sécurité : la suite de tests unitaires (JVM/Robolectric, ~320 tests) tourne à
# chaque push et PR sur les deux branches. `main` doit rester releasable en permanence ;
# `develop` porte le travail courant (cf. workflow de branches du projet).
name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Cache Gradle + wrapper gérés par l'action officielle.
      - name: Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Tests unitaires
        run: ./gradlew testDebugUnitTest

      # Rapport JUnit publié en artefact quand ça casse (diagnostic sans re-run local).
      - name: Rapport de tests (en échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-tests
          path: app/build/reports/tests/testDebugUnitTest/